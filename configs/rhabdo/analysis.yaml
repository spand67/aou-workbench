analysis_name: rhabdo_end_to_end
output_dir: ./outputs
matched_outcome_column: analysis_case
run_stage1: true
run_stage2: true
run_stage3: true
run_stage4: true
stage1:
  variant_table: ./data/rhabdo/stage1_candidate_variants.tsv
  person_id_column: person_id
  variant_id_column: variant_id
  dosage_column: dosage
  gene_column: gene
  carrier_min_dosage: 1.0
  covariates: [age_at_index, is_female, pc1, pc2, pc3, statin_exposure]
stage2:
  variant_table: ./data/rhabdo/stage2_rare_variants.tsv
  person_id_column: person_id
  variant_id_column: variant_id
  gene_column: gene
  dosage_column: dosage
  clinvar_column: clinvar_significance
  consequence_column: consequence
  revel_column: revel
  af_column: max_af
  max_af: 0.01
  revel_min: 0.8
  covariates: [age_at_index, is_female, pc1, pc2, pc3, statin_exposure]
stage3:
  variant_table: ./data/rhabdo/stage3_burden_variants.tsv
  mode: targeted
  run_exome_wide: false
  person_id_column: person_id
  variant_id_column: variant_id
  gene_column: gene
  dosage_column: dosage
  clinvar_column: clinvar_significance
  consequence_column: consequence
  revel_column: revel
  af_column: max_af
  max_af: 0.01
  revel_min: 0.8
  masks: [pLoF, ClinVar_PLP, pLoF_or_REVEL_0_8]
  covariates: [age_at_index, is_female, pc1, pc2, pc3, statin_exposure]
stage4:
  genotype_table: ./data/rhabdo/stage4_gwas_genotypes.tsv
  annotation_table: ./data/rhabdo/stage4_gwas_annotations.tsv
  person_id_column: person_id
  variant_id_column: variant_id
  dosage_column: dosage
  chromosome_column: chromosome
  position_column: position
  gene_column: gene
  af_column: maf
  covariates: [age_at_index, is_female, pc1, pc2, pc3, statin_exposure]
  min_maf: 0.01
  min_minor_allele_count: 5
  pvalue_threshold: 5.0e-08
  qvalue_threshold: 0.1
  lead_hit_window_bp: 250000
reporting:
  include_all_by_all_comparison: false
  all_by_all_table:
  top_n: 10
