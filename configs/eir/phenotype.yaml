tables:
  person_table: person
  observation_table: observation_period
  condition_table: condition_occurrence
  measurement_table: measurement
  concept_table: concept
  ancestry_table: gs://vwb-aou-datasets-controlled/v8/wgs/short_read/snpindel/aux/ancestry/*.ancestry_preds.tsv
person_id_column: person_id
observation_start_column: observation_start_date
observation_end_column: observation_end_date
condition_concept_column: condition_concept_id
condition_date_column: condition_start_date
measurement_concept_column: measurement_concept_id
measurement_value_column: value_as_number
measurement_date_column: measurement_date
ancestry_person_id_column: research_id
ancestry_label_column: ancestry_pred
pc_columns: [PC1, PC2, PC3, PC4, PC5, PC6, PC7, PC8, PC9, PC10]
definite:
  condition_terms: [rhabdomyolysis]
  measurement_terms: [creatine kinase]
  measurement_min: 5000
  require_condition: true
  require_measurement: true
  measurement_window_start_days: -7
  measurement_window_end_days: 45
broad:
  condition_terms: [rhabdomyolysis]
  require_condition: true
  require_measurement: false
clinical_cofactors:
  - name: crush_injury
    condition_terms: [crush injury, crush syndrome, traumatic rhabdomyolysis]
  - name: major_trauma
    condition_terms: [major trauma, multiple trauma, traumatic injury, fracture, crushing injury]
  - name: sepsis
    condition_terms: [sepsis, septic shock]
  - name: renal_injury
    condition_terms: [acute kidney injury, acute renal failure, acute kidney failure, acute tubular necrosis]
  - name: kidney_disease
    condition_terms: [chronic kidney disease, kidney disease, renal insufficiency, renal failure]
  - name: heat_illness
    condition_terms: [heat stroke, heat exhaustion, heat illness, heat syncope]
  - name: dehydration
    condition_terms: [dehydration, volume depletion, hypovolemia]
  - name: exertion_exercise
    condition_terms: [exertion, exercise, overexertion, strenuous activity]
  - name: myopathy_muscle_disease
    condition_terms: [myopathy, muscular dystrophy, glycogen storage disease, mitochondrial myopathy, metabolic myopathy, myositis]
  - name: sickle_cell_trait_or_disease
    condition_terms: [sickle-cell trait, sickle cell trait, sickle-cell disease, sickle cell disease]
  - name: diabetes
    condition_terms: [diabetes mellitus, type 1 diabetes, type 2 diabetes]
  - name: thyroid_disease
    condition_terms: [hypothyroidism, hyperthyroidism, thyroid disease, thyrotoxicosis]
  - name: liver_disease
    condition_terms: [liver disease, hepatic failure, cirrhosis, hepatitis]
  - name: alcohol_substance
    condition_terms: [alcohol use disorder, alcohol abuse, substance abuse, substance use disorder, cocaine abuse, stimulant abuse, opioid abuse]
  - name: prior_injury_trauma
    condition_terms: [injury, trauma, sprain, strain, fracture, contusion]
control_exclusion_concept_ids: []
min_observation_days: 365
